<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeleChat</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="screen active">
    <div class="auth-container">
      <div class="auth-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 48 48" fill="none">
            <circle cx="24" cy="24" r="24" fill="#0088cc"/>
            <path d="M12 24l4 4 8-8M32 18l-12 12-4-4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M10 22l14-8 14 6-4 16-10 2-8-6z" fill="white" opacity="0.2"/>
            <path d="M34 14L20 28l-6-4" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          </svg>
        </div>
        <h1>TeleChat</h1>
        <p class="auth-subtitle">Fast. Secure. Powerful.</p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form">
        <h2>Sign In</h2>
        <div class="input-group">
          <input type="text" id="login-username" placeholder="Username" autocomplete="username" required>
        </div>
        <div class="input-group">
          <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
        <p class="auth-switch">Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
        <div id="login-error" class="error-msg"></div>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="auth-form" style="display:none">
        <h2>Create Account</h2>
        <div class="input-group">
          <input type="text" id="signup-display" placeholder="Display Name" required>
        </div>
        <div class="input-group">
          <input type="text" id="signup-username" placeholder="Username" autocomplete="username" required>
        </div>
        <div class="input-group">
          <input type="password" id="signup-password" placeholder="Password (6+ characters)" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn-primary">Create Account</button>
        <p class="auth-switch">Already have an account? <a href="#" id="show-login">Sign In</a></p>
        <div id="signup-error" class="error-msg"></div>
      </form>
    </div>
  </div>

  <!-- MAIN CHAT SCREEN -->
  <div id="chat-screen" class="screen">
    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <button id="menu-btn" class="icon-btn" title="Menu">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" id="search-input" placeholder="Search users...">
        </div>
      </div>

      <div id="search-results" class="search-results" style="display:none"></div>

      <div class="sidebar-tabs">
        <button class="tab-btn active" data-tab="chats">Chats</button>
        <button class="tab-btn" data-tab="calls">Calls</button>
      </div>

      <div id="conversations-list" class="conversations-list"></div>
      <div id="calls-list" class="calls-list" style="display:none"></div>

      <!-- Sidebar menu -->
      <div id="sidebar-menu" class="sidebar-menu" style="display:none">
        <div class="menu-user-info">
          <div id="menu-avatar" class="avatar"></div>
          <div>
            <div id="menu-display-name" class="menu-name"></div>
            <div id="menu-username" class="menu-uname"></div>
          </div>
        </div>
        <div class="menu-divider"></div>
        <button id="logout-btn" class="menu-item">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
          Log Out
        </button>
      </div>
    </aside>

    <!-- Chat Area -->
    <main id="chat-area">
      <!-- Empty state -->
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 80 80" width="80" height="80">
            <circle cx="40" cy="40" r="38" fill="none" stroke="#0088cc" stroke-width="2" opacity="0.3"/>
            <path d="M25 30h30v4H25zm0 8h20v4H25zm0 8h25v4H25z" fill="#0088cc" opacity="0.3"/>
          </svg>
        </div>
        <h3>Select a chat to start messaging</h3>
        <p>Or search for users to start a new conversation</p>
      </div>

      <!-- Chat header -->
      <div id="chat-header" class="chat-header" style="display:none">
        <button id="back-btn" class="icon-btn mobile-only">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>
        <div id="chat-user-info" class="chat-user-info">
          <div id="chat-avatar" class="avatar"></div>
          <div>
            <div id="chat-name" class="chat-name"></div>
            <div id="chat-status" class="chat-status"></div>
          </div>
        </div>
        <div class="chat-actions">
          <button id="voice-call-btn" class="icon-btn" title="Voice Call">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
          </button>
          <button id="video-call-btn" class="icon-btn" title="Video Call">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
          </button>
        </div>
      </div>

      <!-- Messages -->
      <div id="messages-container" class="messages-container" style="display:none">
        <div id="messages-list" class="messages-list"></div>
      </div>

      <!-- Typing indicator -->
      <div id="typing-indicator" class="typing-indicator" style="display:none">
        <span id="typing-name"></span> is typing<span class="typing-dots"><span>.</span><span>.</span><span>.</span></span>
      </div>

      <!-- Message input -->
      <div id="message-input-area" class="message-input-area" style="display:none">
        <div class="input-wrapper">
          <button id="emoji-btn" class="icon-btn">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>
          </button>
          <textarea id="message-input" placeholder="Message" rows="1"></textarea>
          <button id="send-btn" class="icon-btn send-btn">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- CALL SCREEN OVERLAY -->
  <div id="call-screen" class="call-screen" style="display:none">
    <div class="call-content">
      <div id="call-avatar" class="call-avatar"></div>
      <h2 id="call-user-name"></h2>
      <p id="call-status-text" class="call-status-text">Calling...</p>
      <p id="call-timer" class="call-timer" style="display:none">00:00</p>

      <div id="remote-video-container" class="remote-video-container" style="display:none">
        <video id="remote-video" autoplay playsinline></video>
      </div>
      <video id="local-video" class="local-video" autoplay playsinline muted style="display:none"></video>

      <div class="call-controls">
        <button id="call-mute-btn" class="call-control-btn" title="Mute">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 14c1.66 0 2.99-1.34 2.99-3L15 5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.41 2.72 6.23 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
        </button>
        <button id="call-end-btn" class="call-control-btn end-call" title="End Call">
          <svg viewBox="0 0 24 24" width="28" height="28"><path fill="white" d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
        </button>
        <button id="call-video-toggle-btn" class="call-control-btn" title="Toggle Video">
          <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- INCOMING CALL OVERLAY -->
  <div id="incoming-call" class="incoming-call" style="display:none">
    <div class="incoming-call-content">
      <div id="incoming-call-avatar" class="call-avatar"></div>
      <h2 id="incoming-call-name"></h2>
      <p id="incoming-call-type">Incoming Voice Call</p>
      <div class="incoming-call-actions">
        <button id="decline-call-btn" class="call-control-btn end-call">
          <svg viewBox="0 0 24 24" width="28" height="28"><path fill="white" d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
        </button>
        <button id="accept-call-btn" class="call-control-btn accept-call">
          <svg viewBox="0 0 24 24" width="28" height="28"><path fill="white" d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56-.35-.12-.74-.03-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
